services:
  postgres:
    image: postgres:16-alpine
    container_name: aichat-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_chat}
      POSTGRES_USER: ${POSTGRES_USER:-ai_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  app:
    build: .
    container_name: aichat-app
    restart: always
    depends_on:
      - postgres
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
