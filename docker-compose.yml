services:
  postgres:
    image: postgres:16-alpine
    container_name: aichat-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_chat}
      POSTGRES_USER: ${POSTGRES_USER:-ai_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_chat} -d ${POSTGRES_DB:-ai_chat}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  app:
    build: .
    container_name: aichat-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
