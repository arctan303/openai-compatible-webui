<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - AI Chat</title>
  <meta name="description" content="登录 AI Chat 账号" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">AI</div>
      <h1>AI Chat</h1>
    </div>

    <p class="login-subtitle">登录你的账号 · v3.1-Setup-Wizard</p>

    <form id="login-form" autocomplete="on" novalidate>
      <div class="form-group">
        <input
          id="username"
          name="username"
          class="form-input"
          type="text"
          placeholder="用户名"
          autocomplete="username"
          required
          aria-label="用户名"
        />
      </div>
      <div class="form-group">
        <input
          id="password"
          name="password"
          class="form-input"
          type="password"
          placeholder="密码"
          autocomplete="current-password"
          required
          aria-label="密码"
        />
      </div>

      <button type="submit" class="btn-login" id="login-btn">登录</button>
      <p class="error-msg" id="error-msg" role="alert"></p>
    </form>

    <p class="login-subtitle" style="margin-top:1rem;margin-bottom:0;">
      首次部署请先使用默认管理员账号登录，登录后访问 <a href="/setup" style="color:var(--text-muted);text-decoration:none;">/setup</a>。初始化完成后该入口会自动关闭。
    </p>
  </div>
</div>

<script>
  const form = document.getElementById('login-form');
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('error-msg');
  const uInput = document.getElementById('username');
  const pInput = document.getElementById('password');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    [uInput, pInput].forEach(el => el.classList.remove('error'));

    const username = uInput.value.trim();
    const password = pInput.value;

    if (!username) { uInput.classList.add('error'); uInput.focus(); return; }
    if (!password) { pInput.classList.add('error'); pInput.focus(); return; }

    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        window.location.href = '/chat';
      } else {
        const err = await res.json().catch(() => ({}));
        errorEl.textContent = err.detail || '用户名或密码错误';
        pInput.classList.add('error');
        pInput.focus();
      }
    } catch {
      errorEl.textContent = '网络错误，请重试';
    } finally {
      btn.disabled = false;
      btn.textContent = '登录';
    }
  });
</script>
</body>
</html>
