<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台 — AI Chat</title>
  <link rel="stylesheet" id="hljs-style" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" href="/static/css/style.css?v=2.4" />
  <style>
    body { overflow: auto; height: auto; transition: background-color 0.3s, color 0.3s; }
    .admin-shell { min-height: 100dvh; background: var(--bg-msg); padding-bottom: 2rem; }
    .card { background: var(--bg); border: 1px solid var(--border); }
    .data-table th { background: var(--bg-msg); color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .data-table td { border-bottom: 1px solid var(--border); color: var(--text-main); }
    .data-table tr:hover td { background: var(--bg-msg); }
    .form-label { color: var(--text-muted); }
    .form-input { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); }
    .form-input:focus { border-color: var(--text-muted); }
    .admin-nav { background: var(--bg); border-bottom: 1px solid var(--border); color: var(--text-main); }
    .admin-title { color: var(--text-main); }
    .badge-gray { background: var(--bg-msg); color: var(--text-muted); }
  </style>
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'auto';
      const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
      function applyTheme(t) {
        if (t === 'dark' || (t === 'auto' && darkQuery.matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }
      applyTheme(theme);
      darkQuery.addEventListener('change', () => { if(localStorage.getItem('theme') === 'auto') applyTheme('auto'); });
    })();
  </script>
</head>
<body>
  <div class="admin-shell">
    <nav class="admin-nav" style="display:flex;align-items:center;gap:.75rem;height:54px;padding:0 2rem;">
      <div class="admin-nav-brand" style="font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:8px;">
        <div class="dot" style="width:26px;height:26px;background:var(--text);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:12px;">✦</div>
        AI Chat
      </div>
      <span style="color:var(--border);margin:0 .5rem">/</span>
      <span style="font-size:.875rem;color:var(--text-muted)">管理后台</span>
      <div style="flex:1"></div>
      <a href="/chat" style="font-size:.875rem;text-decoration:none;color:var(--text-muted);">← 返回聊天</a>
    </nav>

    <div class="admin-body" style="max-width:900px;margin:0 auto;padding:2rem 1.5rem;display:grid;gap:1rem">
      <div class="admin-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <h1 class="admin-title" style="font-size:1.2rem;font-weight:600">系统设置</h1>
      </div>

      <div class="card" style="padding:1.2rem;border-radius:12px;overflow:hidden;">
        <form id="system-form" autocomplete="off">
          <div class="form-group" style="margin-bottom:.9rem">
            <label class="form-label" for="sys-api-base" style="display:block;font-size:.78rem;font-weight:500;margin-bottom:.35rem;text-transform:uppercase;">System API Base</label>
            <input id="sys-api-base" class="form-input" type="url" style="width:100%;padding:.75rem 1rem;border-radius:10px;outline:none;" required />
          </div>
          <div class="form-group" style="margin-bottom:.9rem">
            <label class="form-label" for="sys-api-key" style="display:block;font-size:.78rem;font-weight:500;margin-bottom:.35rem;text-transform:uppercase;">System API Key</label>
            <input id="sys-api-key" class="form-input" type="text" style="width:100%;padding:.75rem 1rem;border-radius:10px;outline:none;" />
          </div>
          <div class="form-group" style="margin-bottom:.9rem">
            <label class="form-label" for="sys-default-model" style="display:block;font-size:.78rem;font-weight:500;margin-bottom:.35rem;text-transform:uppercase;">系统默认模型</label>
            <input id="sys-default-model" class="form-input" type="text" style="width:100%;padding:.75rem 1rem;border-radius:10px;outline:none;" />
          </div>
          <div class="modal-actions" style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
            <button type="submit" class="btn btn-accent btn-sm" style="cursor:pointer;padding:.35rem .75rem;border-radius:8px;font-weight:500;">保存系统设置</button>
          </div>
        </form>
      </div>

      <div class="admin-header" style="display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;margin-bottom:.5rem">
        <h1 class="admin-title" style="font-size:1.2rem;font-weight:600">用户管理</h1>
        <button class="btn btn-accent btn-sm" id="create-btn" style="cursor:pointer;padding:.35rem .75rem;border-radius:8px;font-weight:500;">新建用户</button>
      </div>

      <div class="card" style="border-radius:12px;overflow:hidden;">
        <div class="table-wrap" style="overflow-x:auto">
          <table class="data-table" style="width:100%;border-collapse:collapse;font-size:.875rem;">
            <thead>
              <tr>
                <th style="padding:.6rem 1rem;text-align:left;font-size:.72rem;text-transform:uppercase;">ID</th>
                <th style="padding:.6rem 1rem;text-align:left;font-size:.72rem;text-transform:uppercase;">用户名</th>
                <th style="padding:.6rem 1rem;text-align:left;font-size:.72rem;text-transform:uppercase;">API Key</th>
                <th style="padding:.6rem 1rem;text-align:left;font-size:.72rem;text-transform:uppercase;">角色</th>
                <th style="padding:.6rem 1rem;text-align:left;font-size:.72rem;text-transform:uppercase;">操作</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let users = [];
    async function loadSystemConfig() {
      const res = await fetch('/api/admin/system');
      if (res.ok) {
        const config = await res.json();
        document.getElementById('sys-api-base').value = config.api_base || '';
        document.getElementById('sys-api-key').value = config.api_key || '';
        document.getElementById('sys-default-model').value = config.default_model || '';
      }
    }
    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      if (res.ok) {
        users = await res.json();
        const tbody = document.getElementById('users-tbody');
        tbody.innerHTML = users.map(u => `
          <tr>
            <td style="padding:.7rem 1rem;color:var(--text-muted)">${u.id}</td>
            <td style="padding:.7rem 1rem;"><strong>${u.username}</strong></td>
            <td style="padding:.7rem 1rem;color:var(--text-muted);font-size:.8rem">${u.api_key || '默认'}</td>
            <td style="padding:.7rem 1rem;">${u.is_admin ? '<span class="badge badge-green">管理员</span>' : '<span class="badge badge-gray">用户</span>'}</td>
            <td style="padding:.7rem 1rem;"><button class="btn btn-ghost btn-sm">编辑</button></td>
          </tr>
        `).join('');
      }
    }
    loadSystemConfig();
    loadUsers();
  </script>
</body>
</html>
