<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>用户管理 — AI Chat</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="admin-shell">

    <nav class="admin-nav">
      <div class="admin-nav-brand">
        <div class="dot">✦</div>
        AI Chat
      </div>
      <span style="color:var(--border);margin:0 .5rem">/</span>
      <span style="font-size:.875rem;color:var(--text-muted)">用户管理</span>
      <div class="spacer"></div>
      <a href="/chat">← 返回聊天</a>
    </nav>

    <div class="admin-body">
      <div class="admin-header">
        <h1 class="admin-title">用户管理</h1>
        <button class="btn btn-accent btn-sm" id="create-btn" aria-label="新建用户">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          新建用户
        </button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="data-table" id="users-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>用户名</th>
                <th>API Base</th>
                <th>默认模型</th>
                <th>可用模型</th>
                <th>角色</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:2rem">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Create / Edit Modal -->
  <div class="modal-overlay" id="user-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal" style="max-width:520px">
      <div class="modal-title">
        <span id="modal-title-text">新建用户</span>
        <button class="icon-btn" id="modal-close" aria-label="关闭">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <form id="user-form" autocomplete="off">
        <input type="hidden" id="edit-user-id" />

        <div class="form-group">
          <label class="form-label" for="f-username">用户名</label>
          <input id="f-username" class="form-input" type="text" placeholder="用户名" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-password">
            密码 <span id="password-hint" style="font-size:.75rem;color:var(--text-muted)">(留空保持不变)</span>
          </label>
          <input id="f-password" class="form-input" type="password" placeholder="密码" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-apikey">API Key <span style="text-transform:none;opacity:.6">(私有专用，留空默认走系统余额)</span></label>
          <input id="f-apikey" class="form-input" type="text" placeholder="留空则自动使用管理员配置的全局默认Key" />
        </div>
        <!-- API Base 现由系统统一接管 -->
        <div class="form-group" style="display:none">
          <label class="form-label" for="f-apibase">API Base URL</label>
          <input id="f-apibase" class="form-input" type="url" value="" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-model">默认模型</label>
          <input id="f-model" class="form-input" type="text" placeholder="gpt-4o" value="gpt-4o" />
        </div>

        <!-- Allowed models -->
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
            <span class="form-label" style="margin:0">可用模型白名单</span>
            <button type="button" class="btn btn-ghost btn-sm" id="fetch-models-btn" style="font-size:.75rem;padding:.3rem .65rem;gap:5px">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
              从接口获取模型列表
            </button>
          </div>
          <div id="models-loading" style="display:none;font-size:.8rem;color:var(--text-muted);padding:.4rem 0">
            正在获取模型列表...
          </div>
          <div id="models-checklist" style="
            max-height:200px;overflow-y:auto;
            border:1px solid var(--border);border-radius:var(--radius-sm);
            padding:.5rem .75rem;display:none;
            background:var(--bg-secondary);
            display:none
          ">
            <!-- checkboxes injected here -->
          </div>
          <p style="font-size:.75rem;color:var(--text-muted);margin-top:.4rem">
            留空 = 不限制（可使用所有模型）
          </p>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-admin" style="cursor:pointer">
            <input id="f-admin" type="checkbox" style="margin-right:6px;vertical-align:middle" />
            <span style="vertical-align:middle">管理员权限</span>
          </label>
        </div>

        <p class="error-message" id="modal-error"></p>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost btn-sm" id="modal-cancel">取消</button>
          <button type="submit" class="btn btn-accent btn-sm" id="modal-submit">创建</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let users = [];
    let editingId = null;
    let fetchedModels = [];  // models fetched from API
    let currentAllowedModels = [];  // current user's allowed_models

    // ─── DOM ─────────────────────────────────────────────────────────────────
    const modal         = document.getElementById('user-modal');
    const modalTitleTxt = document.getElementById('modal-title-text');
    const modalSubmit   = document.getElementById('modal-submit');
    const modalError    = document.getElementById('modal-error');
    const pwHint        = document.getElementById('password-hint');
    const tbody         = document.getElementById('users-tbody');
    const modelsLoading = document.getElementById('models-loading');
    const modelsChecklist = document.getElementById('models-checklist');
    const fetchModelsBtn = document.getElementById('fetch-models-btn');

    // ─── Utils ───────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg, type = '') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // ─── Fetch models from API ────────────────────────────────────────────────
    fetchModelsBtn.addEventListener('click', async () => {
      const apiKey  = document.getElementById('f-apikey').value.trim();
      let safeKey = (apiKey && apiKey.includes('***')) ? '' : apiKey;

      modelsLoading.style.display = 'block';
      modelsChecklist.style.display = 'none';
      fetchModelsBtn.disabled = true;

      try {
        const params = new URLSearchParams();
        if (safeKey) params.append('api_key', safeKey);
        
        const res = await fetch(`/api/admin/models?${params}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || '获取失败');
        }
        const data = await res.json();
        fetchedModels = data.data || [];

        renderModelsChecklist();
        modelsChecklist.style.display = 'block';

        if (fetchedModels.length === 0) {
          showToast('未获取到任何模型', 'error');
        } else {
          showToast(`获取到 ${fetchedModels.length} 个模型`, 'success');
        }
      } catch (err) {
        showToast('获取模型失败: ' + err.message, 'error');
      } finally {
        modelsLoading.style.display = 'none';
        fetchModelsBtn.disabled = false;
      }
    });

    function renderModelsChecklist() {
      modelsChecklist.innerHTML = `
        <div style="display:flex;gap:12px;margin-bottom:.5rem;font-size:.75rem;color:var(--text-muted)">
          <label style="cursor:pointer">
            <input type="checkbox" id="check-all" style="margin-right:4px" />全选
          </label>
          <label style="cursor:pointer">
            <input type="checkbox" id="check-none" style="margin-right:4px" />全不选（不限制）
          </label>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          ${fetchedModels.map(m => `
            <label style="display:flex;align-items:center;gap:6px;font-size:.8rem;cursor:pointer;padding:.2rem .1rem">
              <input type="checkbox" name="model-allow" value="${esc(m.id)}"
                ${currentAllowedModels.includes(m.id) ? 'checked' : ''} />
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.id)}</span>
            </label>
          `).join('')}
        </div>
      `;

      document.getElementById('check-all').addEventListener('change', (e) => {
        modelsChecklist.querySelectorAll('input[name="model-allow"]')
          .forEach(cb => cb.checked = e.target.checked);
      });
      document.getElementById('check-none').addEventListener('change', (e) => {
        if (e.target.checked) {
          modelsChecklist.querySelectorAll('input[name="model-allow"]')
            .forEach(cb => cb.checked = false);
        }
      });
    }

    function getSelectedModels() {
      const checked = [...modelsChecklist.querySelectorAll('input[name="model-allow"]:checked')];
      return checked.map(cb => cb.value);
    }

    // ─── Open modal ───────────────────────────────────────────────────────────
    function openModal(user = null) {
      editingId = user ? user.id : null;
      fetchedModels = [];
      currentAllowedModels = [];

      modalTitleTxt.textContent = user ? '编辑用户' : '新建用户';
      modalSubmit.textContent = user ? '保存' : '创建';
      pwHint.style.display = user ? 'inline' : 'none';

      document.getElementById('f-username').value = user?.username || '';
      document.getElementById('f-username').disabled = !!user;
      document.getElementById('f-password').value = '';
      document.getElementById('f-password').required = !user;
      document.getElementById('f-apikey').value = user?.api_key || '';
      document.getElementById('f-apibase').value = user?.api_base || 'https://api.openai.com/v1';
      document.getElementById('f-model').value = user?.model || 'gpt-4o';
      document.getElementById('f-admin').checked = !!user?.is_admin;
      modalError.textContent = '';

      // Reset model checklist
      modelsChecklist.style.display = 'none';
      modelsLoading.style.display = 'none';
      modelsChecklist.innerHTML = '';

      // Restore current allowed_models if user has them
      if (user?.allowed_models) {
        try {
          currentAllowedModels = typeof user.allowed_models === 'string'
            ? JSON.parse(user.allowed_models)
            : (user.allowed_models || []);
        } catch { currentAllowedModels = []; }
      }

      modal.classList.add('open');
      document.getElementById('f-username').focus();
    }

    function closeModal() {
      modal.classList.remove('open');
    }

    // ─── Load users ───────────────────────────────────────────────────────────
    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      if (!res.ok) { window.location.href = '/'; return; }
      users = await res.json();
      renderTable();
    }

    function renderTable() {
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:2rem">暂无用户</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => {
        let allowedDisplay = '<span style="color:var(--text-muted);font-size:.75rem">不限制</span>';
        if (u.allowed_models) {
          try {
            const list = typeof u.allowed_models === 'string' ? JSON.parse(u.allowed_models) : u.allowed_models;
            if (list && list.length) {
              allowedDisplay = `<span style="font-size:.75rem;color:var(--accent)">${list.length} 个模型</span>`;
            }
          } catch {}
        }
        return `
          <tr>
            <td style="color:var(--text-muted)">${u.id}</td>
            <td><strong>${esc(u.username)}</strong></td>
            <td style="color:var(--text-muted);font-size:.8rem;max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(u.api_base || '—')}</td>
            <td><code style="font-size:.8rem">${esc(u.model || '—')}</code></td>
            <td>${allowedDisplay}</td>
            <td>
              ${u.is_admin
                ? '<span class="badge badge-green">管理员</span>'
                : '<span class="badge badge-gray">普通用户</span>'}
            </td>
            <td style="color:var(--text-muted);font-size:.8rem">${u.created_at?.slice(0,10) || '—'}</td>
            <td>
              <div style="display:flex;gap:6px">
                <button class="btn btn-ghost btn-sm" onclick="editUser(${u.id})" aria-label="编辑用户 ${esc(u.username)}">编辑</button>
                <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${esc(u.username)}')" aria-label="删除用户 ${esc(u.username)}">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // ─── Actions ─────────────────────────────────────────────────────────────
    function editUser(id) {
      const user = users.find(u => u.id === id);
      if (user) openModal(user);
    }

    async function deleteUser(id, name) {
      if (!confirm(`确定要删除用户 "${name}" 吗？此操作不可撤销。`)) return;
      const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
      if (res.ok) {
        showToast('用户已删除', 'success');
        loadUsers();
      } else {
        const err = await res.json();
        showToast(err.detail || '删除失败', 'error');
      }
    }

    window.editUser = editUser;
    window.deleteUser = deleteUser;

    // ─── Form submit ──────────────────────────────────────────────────────────
    document.getElementById('user-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      modalError.textContent = '';

      // Collect allowed_models
      let allowedModels = null;
      if (modelsChecklist.style.display !== 'none' && fetchedModels.length > 0) {
        allowedModels = getSelectedModels();  // [] means no restriction
      }

      const body = {
        username:       document.getElementById('f-username').value.trim(),
        password:       document.getElementById('f-password').value,
        api_key:        document.getElementById('f-apikey').value.trim(),
        api_base:       document.getElementById('f-apibase').value.trim(),
        model:          document.getElementById('f-model').value.trim(),
        is_admin:       document.getElementById('f-admin').checked ? 1 : 0,
        allowed_models: allowedModels,
      };

      let res;
      if (editingId) {
        const updateBody = {
          api_key:  body.api_key,
          api_base: body.api_base,
          model:    body.model,
          is_admin: body.is_admin,
        };
        if (body.password) updateBody.password = body.password;
        if (allowedModels !== null) updateBody.allowed_models = allowedModels;

        res = await fetch(`/api/admin/users/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updateBody),
        });
      } else {
        res = await fetch('/api/admin/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
      }

      if (res.ok) {
        showToast(editingId ? '用户已更新' : '用户已创建', 'success');
        closeModal();
        loadUsers();
      } else {
        const err = await res.json();
        modalError.textContent = err.detail || '操作失败';
      }
    });

    // ─── Modal controls ───────────────────────────────────────────────────────
    document.getElementById('create-btn').addEventListener('click', () => openModal());
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // ─── Init ─────────────────────────────────────────────────────────────────
    loadUsers();
  </script>
</body>
</html>
