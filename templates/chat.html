<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* Custom scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 99px; }
    
    .markdown-body p { margin-bottom: 0.75rem; }
    .markdown-body ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.75rem; }
    .markdown-body ol { list-style-type: decimal; padding-left: 1.25rem; margin-bottom: 0.75rem; }
    .markdown-body pre { background: #1e1e1e; padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.75rem; color: #d4d4d4; overflow-x: auto; font-size: 0.875rem;}
    .markdown-body code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .markdown-body :not(pre) > code { background: #f3f4f6; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875em; }
    .markdown-body hr { border-color: #e5e7eb; margin: 1.5rem 0; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; }
    .markdown-body th, .markdown-body td { border: 1px solid #e5e7eb; padding: 0.5rem; }
    .markdown-body th { background-color: #f9fafb; }
    
    .cursor { display: inline-block; width: 2px; height: 1em; background: currentColor; vertical-align: text-bottom; margin-left: 2px; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body class="flex h-[100dvh] w-full bg-white text-gray-800 font-sans overflow-hidden">
  
  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/20 z-40 hidden md:hidden transition-opacity"></div>
  
  <!-- Sidebar -->
  <div id="sidebar" class="bg-[#f9f9f9] w-0 md:w-[260px] flex-shrink-0 flex flex-col border-r border-gray-200 transition-all duration-300 relative max-md:absolute max-md:h-[100dvh] max-md:z-50 overflow-hidden">
    <div class="p-3 min-w-[260px] flex flex-col gap-1">
        <!-- Logo & Toggle -->
        <div class="flex items-center justify-between mb-2">
            <div class="p-2 hover:bg-gray-200 rounded-lg cursor-pointer transition-colors">
                <!-- OpenAI Logo SVG -->
                <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] text-black">
                    <path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A6.0651 6.0651 0 0 0 19.0192 19.818a5.9847 5.9847 0 0 0 3.9977-2.9001 6.0462 6.0462 0 0 0-.735-7.0968zM8.7504 6.2574a4.356 4.356 0 0 1 3.246-1.5437 4.3368 4.3368 0 0 1 3.2268 1.5247l-5.8344 3.3826a1.5997 1.5997 0 0 0-.8135 1.406v5.3544c-.0155.0466-.062.062-.093.0466L4.3402 14.04a4.3463 4.3463 0 0 1 1.2585-6.611l3.1517-1.1716zm9.8514 1.5437l-4.142 2.3837v4.7674l5.8344-3.3826a4.3463 4.3463 0 0 1-1.6924-4.8216c.0155-.0465.0465-.062.093-.062l4.142.0465a4.356 4.356 0 0 1-4.235 1.0686zM5.4013 15.115l4.142-2.3837V7.9638L3.7088 11.346a4.3463 4.3463 0 0 1 1.6925 4.8216c-.0155.0466-.0465.062-.093.062l-4.142-.0465a4.356 4.356 0 0 1 4.235-1.0686zM14.2357 7.025h-4.4714l2.2357-3.8724 2.2357 3.8724zm-6.1492 10.368l-2.2357-3.8724 4.142-2.3837-1.9063 6.2561zm8.3849-6.2561l4.142 2.3837-2.2357 3.8724-1.9063-6.2561zm-4.4714 6.0967h4.4714l-2.2357 3.8724-2.2357-3.8724z" fill="currentColor" />
                </svg>
            </div>
            <button id="sidebar-close" class="p-2 text-gray-500 hover:bg-gray-200 rounded-lg transition-colors" title="关闭侧边栏">
                <i data-lucide="panel-left-close" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Create & Search -->
        <div class="space-y-0.5">
            <div id="new-chat-btn" class="flex items-center px-2 py-2 rounded-lg cursor-pointer transition-colors hover:bg-gray-200 group">
                <div class="mr-3 text-gray-800"><i data-lucide="edit" class="w-5 h-5"></i></div>
                <span class="truncate text-gray-900 font-medium text-[15px]">新聊天</span>
            </div>
            <div class="flex items-center px-2 py-2 rounded-lg transition-colors bg-gray-200/50 mt-1">
                <div class="mr-3 text-gray-500"><i data-lucide="search" class="w-4 h-4"></i></div>
                <input id="search-input" type="text" placeholder="搜索聊天" class="bg-transparent border-none outline-none w-full text-gray-900 font-medium text-[14px] placeholder-gray-500" />
            </div>
        </div>
    </div>

    <!-- History -->
    <div class="flex-1 overflow-y-auto px-3 py-2 custom-scrollbar text-sm min-w-[260px]">
        <div class="text-xs font-semibold text-gray-500 mb-2 px-2 mt-2">你的聊天</div>
        <div id="history-list" class="space-y-0.5">
            <div id="history-empty" class="text-gray-400 text-xs px-2 py-4 text-center">暂无历史对话</div>
            <!-- Injected items -->
        </div>
    </div>

    <!-- User Section -->
    <div class="p-2 border-t border-gray-200 relative">
        <!-- Overlay menu -->
        <div id="user-menu" class="absolute bottom-full left-2 w-[240px] mb-2 bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.1)] border border-gray-100 py-2 text-sm z-50 transition-opacity hidden">
            <div class="px-3 py-2 hover:bg-gray-100 flex items-center justify-between rounded-md mx-2">
                <div class="flex items-center">
                    <div id="dropdown-avatar" class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center mr-3 text-gray-600 font-medium">U</div>
                    <div>
                        <div id="dropdown-name" class="font-medium text-gray-800">加载中</div>
                        <div class="text-xs text-gray-500">个人帐户</div>
                    </div>
                </div>
            </div>
            <div class="h-[1px] bg-gray-100 my-1 mx-2"></div>
            <div id="admin-link" class="px-3 py-2 mx-2 hover:bg-gray-100 cursor-pointer flex items-center rounded-md text-gray-700 hidden">
                <i data-lucide="settings" class="w-4 h-4 mr-3 text-gray-500"></i> 用户管理
            </div>
            <div class="h-[1px] bg-gray-100 my-1 mx-2 admin-divider hidden"></div>
            <div id="logout-btn" class="px-3 py-2 mx-2 hover:bg-gray-100 cursor-pointer flex items-center rounded-md text-red-600">
                <i data-lucide="log-out" class="w-4 h-4 mr-3 text-red-500"></i> 退出登录
            </div>
        </div>

        <button id="user-btn" class="w-full flex items-center p-2 hover:bg-gray-200 rounded-lg transition-colors">
            <div id="user-avatar" class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center mr-3 text-gray-600 font-medium flex-shrink-0">U</div>
            <div class="text-left overflow-hidden">
                <div id="user-name" class="text-sm font-medium text-gray-800 truncate">加载中</div>
                <div class="text-xs text-gray-500 truncate">个人帐户</div>
            </div>
        </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col relative bg-white min-w-0 h-full">
    
    <!-- Topbar -->
    <div class="flex items-center justify-between px-4 py-3 bg-white/90 backdrop-blur-sm sticky top-0 z-10 shrink-0">
        <div class="flex items-center">
            <button id="sidebar-open" class="mr-3 p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors hidden" title="打开侧边栏">
                <i data-lucide="panel-left" class="w-5 h-5"></i>
            </button>
            <div class="relative flex items-center">
                <div id="model-pill-btn" class="flex items-center cursor-pointer hover:bg-gray-100 px-3 py-1.5 rounded-lg transition-colors">
                    <span id="model-pill-label" class="font-semibold text-lg text-gray-800 mr-1">模型</span>
                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500 transition-transform duration-200"></i>
                </div>
                <!-- Custom Model Dropdown -->
                <div id="model-dropdown" class="absolute top-full left-0 mt-2 w-[240px] bg-white border border-gray-100 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.08)] py-2 z-50 hidden">
                    <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">选择模型</div>
                    <div id="model-dropdown-list" class="max-h-64 overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button class="p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors flex items-center text-sm font-medium">
                <i data-lucide="share" class="w-4 h-4 mr-2"></i> 分享
            </button>
        </div>
    </div>

    <!-- Messages Area -->
    <div id="messages-wrapper" class="flex-1 overflow-y-auto w-full px-4 pt-2">
        <div id="messages-container" class="max-w-3xl mx-auto pb-[180px]">
            <!-- Dynamic Messages Go Here -->
            <div id="empty-state" class="flex flex-col items-center justify-center h-[50vh] text-center opacity-100 transition-opacity">
                <div class="w-12 h-12 bg-black rounded-full flex items-center justify-center text-white text-xl mb-4 font-bold tracking-tighter">✦</div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">有什么可以帮忙的？</h2>
                <p class="text-gray-500">开始一段新的对话吧</p>
            </div>
        </div>
    </div>

    <!-- Bottom Input -->
    <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-6 pb-[calc(0.5rem+env(safe-area-inset-bottom))] px-4 z-20 shrink-0">
        <div class="max-w-3xl mx-auto relative">
            
            <!-- Attachment Strip -->
            <div id="attachment-strip" class="flex flex-wrap gap-2 mb-2 px-2 empty:hidden"></div>

            <div class="bg-[#f4f4f4] rounded-[24px] border border-gray-200/50 shadow-[0_2px_10px_rgba(0,0,0,0.02)] flex items-end px-3 py-3 focus-within:bg-white focus-within:border-gray-300 focus-within:shadow-md transition-all">
                <button id="attach-btn" class="p-2 text-gray-500 hover:text-black hover:bg-gray-200 rounded-full transition-colors shrink-0 mb-0.5">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
                <input type="file" id="file-input" multiple="multiple" style="display:none;" />

                <div class="flex-1 max-h-48 overflow-y-auto px-2 min-h-[24px] flex items-center custom-scrollbar">
                    <textarea id="chat-input" class="w-full bg-transparent border-none focus:outline-none resize-none text-[15px] placeholder-gray-500 py-1.5" rows="1" placeholder="有问题，尽管问"></textarea>
                </div>

                <div class="flex items-center gap-1 shrink-0 mb-0.5">
                    <button id="send-btn" disabled class="w-8 h-8 bg-[#e5e5e5] hover:bg-[#d5d5d5] text-white rounded-full flex items-center justify-center transition-colors shadow-sm ml-1 disabled:opacity-70 disabled:cursor-not-allowed">
                        <i id="send-icon" data-lucide="arrow-up" class="w-5 h-5 text-white"></i>
                        <div id="stop-icon" class="w-3 h-3 bg-black rounded-sm hidden"></div>
                    </button>
                </div>
            </div>
            <div class="text-center text-xs text-gray-500 mt-2">
                AI 也可能会犯错。请核查重要信息。
            </div>
        </div>
    </div>

  </div>

  <script src="/static/js/history.js?v=2.1"></script>
  <script src="/static/js/chat.js?v=2.1"></script>
  <script>
      // Initialize Lucide icons
      lucide.createIcons();
  </script>
</body>
</html>
